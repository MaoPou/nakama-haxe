name: Build and Publish Haxelib

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-bridge:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows
            arch: x64
            bridge_lib: "nakama_bridge.dll"
            sdk_lib: "nakama-sdk.lib"
          - os: ubuntu-latest
            target: linux
            arch: x64
            bridge_lib: "libnakama_bridge.so"
            sdk_lib: "libnakama-sdk.so"
          - os: macos-latest
            target: mac
            arch: universal
            bridge_lib: "libnakama_bridge.dylib"
            sdk_framework: "nakama-sdk.framework"
          - os: macos-latest
            target: ios
            arch: arm64
            bridge_lib: "nakama_bridge.framework"
            sdk_framework: "nakama-sdk.framework"
          - os: ubuntu-latest
            target: android
            arch: armeabi-v7a
            ndk_arch: armv7a
            abi: armeabi-v7a
            bridge_lib: "libnakama_bridge.so"
            sdk_lib: "libnakama-sdk.so"
          - os: ubuntu-latest
            target: android
            arch: arm64-v8a
            ndk_arch: aarch64
            abi: arm64-v8a
            bridge_lib: "libnakama_bridge.so"
            sdk_lib: "libnakama-sdk.so"
          - os: ubuntu-latest
            target: android
            arch: x86
            ndk_arch: i686
            abi: x86
            bridge_lib: "libnakama_bridge.so"
            sdk_lib: "libnakama-sdk.so"
          - os: ubuntu-latest
            target: android
            arch: x86_64
            ndk_arch: x86_64
            abi: x86_64
            bridge_lib: "libnakama_bridge.so"
            sdk_lib: "libnakama-sdk.so"

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSVC (Windows)
        if: matrix.target == 'windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies (Linux)
        if: matrix.target == 'linux'
        run: sudo apt-get update && sudo apt-get install -y g++ make

      - name: Install Android NDK
        if: matrix.target == 'android'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b
          add-to-path: false

      - name: Set NDK environment (Android)
        if: matrix.target == 'android'
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
          echo "PATH=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH" >> $GITHUB_ENV

      - name: Build bridge library (Windows)
        if: matrix.target == 'windows'
        run: |
          cl /EHsc /MD /I"include" /DNAKAMA_SHARED_LIBRARY_EXPORTS ^
            bridge/nakama_bridge.cpp ^
            /link /DLL /OUT:ndll/Windows/nakama_bridge.dll ^
            /LIBPATH:ndll/Windows nakama-sdk.lib

      - name: Build bridge library (Linux)
        if: matrix.target == 'linux'
        run: |
          g++ -shared -fPIC -DNAKAMA_SHARED_LIBRARY_EXPORTS \
            -o ndll/Linux/libnakama_bridge.so \
            bridge/nakama_bridge.cpp \
            -Iinclude \
            -Lndll/Linux \
            -lnakama-sdk

      - name: Build bridge library (macOS)
        if: matrix.target == 'mac'
        run: |
          clang++ -shared -fPIC -DNAKAMA_SHARED_LIBRARY_EXPORTS \
            -o ndll/Mac/libnakama_bridge.dylib \
            bridge/nakama_bridge.cpp \
            -Iinclude \
            -Fndll/Mac \
            -framework nakama-sdk

      - name: Build bridge library (iOS)
        if: matrix.target == 'ios'
        run: |
          mkdir -p ndll/iOS/nakama_bridge.framework/Headers
          clang++ -arch arm64 -isysroot $(xcrun --sdk iphoneos --show-sdk-path) -shared \
            -DNAKAMA_SHARED_LIBRARY_EXPORTS \
            -o ndll/iOS/nakama_bridge.framework/nakama_bridge \
            bridge/nakama_bridge.cpp \
            -Iinclude \
            -Fndll/iOS \
            -framework nakama-sdk
          cp include/nakama_bridge.h ndll/iOS/nakama_bridge.framework/Headers/

      - name: Build bridge library (Android)
        if: matrix.target == 'android'
        run: |
          if [[ "${{ matrix.ndk_arch }}" == "armv7a" ]]; then
            TOOLCHAIN=armv7a-linux-androideabi21-clang++
          elif [[ "${{ matrix.ndk_arch }}" == "aarch64" ]]; then
            TOOLCHAIN=aarch64-linux-android21-clang++
          elif [[ "${{ matrix.ndk_arch }}" == "i686" ]]; then
            TOOLCHAIN=i686-linux-android21-clang++
          elif [[ "${{ matrix.ndk_arch }}" == "x86_64" ]]; then
            TOOLCHAIN=x86_64-linux-android21-clang++
          fi
          $TOOLCHAIN -shared -fPIC -DNAKAMA_SHARED_LIBRARY_EXPORTS \
            -o ndll/Android/${{ matrix.abi }}/libnakama_bridge.so \
            bridge/nakama_bridge.cpp \
            -Iinclude \
            -Lndll/Android/${{ matrix.abi }} \
            -lnakama-sdk

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bridge-${{ matrix.target }}-${{ matrix.arch }}
          path: |
            ndll/${{ matrix.target }}/${{ matrix.bridge_lib }}
            ndll/${{ matrix.target }}/${{ matrix.sdk_lib }}

  package:
    needs: build-bridge
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all bridge artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Copy bridge libraries into ndll
        run: |
          # Windows
          mkdir -p ndll/Windows
          cp -r artifacts/bridge-windows-x64/ndll/Windows/* ndll/Windows/ 2>/dev/null || true
          
          # Linux
          mkdir -p ndll/Linux
          cp -r artifacts/bridge-linux-x64/ndll/Linux/* ndll/Linux/ 2>/dev/null || true
          
          # macOS
          mkdir -p ndll/Mac
          cp -r artifacts/bridge-mac-universal/ndll/Mac/* ndll/Mac/ 2>/dev/null || true
          
          # iOS
          mkdir -p ndll/iOS
          cp -r artifacts/bridge-ios-arm64/ndll/iOS/* ndll/iOS/ 2>/dev/null || true
          
          # Android
          mkdir -p ndll/Android
          for abi in armeabi-v7a arm64-v8a x86 x86_64; do
            mkdir -p ndll/Android/$abi
            cp artifacts/bridge-android-$abi/ndll/Android/$abi/* ndll/Android/$abi/ 2>/dev/null || true
          done

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.4

      - name: Generate haxelib.json
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed "s/__VERSION__/$VERSION/g" haxelib.json.template > haxelib.json

      - name: Generate include.xml
        run: |
          if [ -f include.xml.template ]; then
            sed "s/__VERSION__/$VERSION/g" include.xml.template > include.xml
          fi

      - name: Pack haxelib
        run: |
          haxelib pack .

      - name: Publish to Haxelib
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          HAXELIB_PASSWORD: ${{ secrets.HAXELIB_PASSWORD }}
        run: |
          haxelib submit nakama-sdk-${VERSION}.zip --password $HAXELIB_PASSWORD