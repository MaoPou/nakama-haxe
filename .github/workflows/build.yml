name: Build and Publish Haxelib

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-bridge:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: Windows
            arch: x64
          - os: ubuntu-latest
            target: Linux
            arch: x64
          - os: macos-latest
            target: Mac
            arch: universal
          - os: macos-latest
            target: iOS
            arch: arm64
          - os: ubuntu-latest
            target: Android
            arch: armeabi-v7a
            abi: armeabi-v7a
            ndk_arch: armv7a
          - os: ubuntu-latest
            target: Android
            arch: arm64-v8a
            abi: arm64-v8a
            ndk_arch: aarch64
          - os: ubuntu-latest
            target: Android
            arch: x86
            abi: x86
            ndk_arch: i686
          - os: ubuntu-latest
            target: Android
            arch: x86_64
            abi: x86_64
            ndk_arch: x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSVC (Windows)
        if: matrix.target == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies (Linux)
        if: matrix.target == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y g++ make

      - name: Install Android NDK
        if: matrix.target == 'Android'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b
          add-to-path: false

      - name: Set NDK environment (Android)
        if: matrix.target == 'Android'
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
          echo "PATH=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH" >> $GITHUB_ENV

      - name: Build bridge library (Windows)
        if: matrix.target == 'Windows'
        run: |
          mkdir -p ndll/Windows
          cl /EHsc /MD /I"include" /DNAKAMA_SHARED_LIBRARY_EXPORTS /std:c++17 bridge/nakama_bridge.cpp /link /DLL /OUT:ndll/Windows/nakama_bridge.dll /LIBPATH:ndll/Windows nakama-sdk.lib

      - name: Build bridge library (Linux)
        if: matrix.target == 'Linux'
        run: |
          mkdir -p ndll/Linux
          g++ -shared -fPIC -std=c++17 -DNAKAMA_SHARED_LIBRARY_EXPORTS \
            -o ndll/Linux/libnakama_bridge.so \
            bridge/nakama_bridge.cpp \
            -Iinclude \
            -Lndll/Linux \
            -lnakama-sdk

      - name: Build bridge library (macOS)
        if: matrix.target == 'Mac'
        run: |
          # 检查 framework 是否存在
          if [ ! -d "ndll/Mac/nakama-sdk.framework" ]; then
            echo "❌ ERROR: nakama-sdk.framework not found at ndll/Mac/"
            echo "Current ndll/Mac contents:"
            ls -la ndll/Mac/ 2>/dev/null || echo "Directory is empty"
            exit 1
          fi
          
          # 检查 framework 二进制文件
          if [ ! -f "ndll/Mac/nakama-sdk.framework/nakama-sdk" ]; then
            echo "❌ ERROR: Framework binary not found"
            echo "Framework contents:"
            ls -la ndll/Mac/nakama-sdk.framework/
            exit 1
          fi
          
          # 检查 framework 架构
          echo "📋 Checking framework architecture:"
          file ndll/Mac/nakama-sdk.framework/nakama-sdk
          lipo -info ndll/Mac/nakama-sdk.framework/nakama-sdk 2>/dev/null || echo "Not a fat binary (may be single architecture)"
          
          # 编译桥接库
          echo "🔨 Building bridge library..."
          clang++ -shared -fPIC -std=c++17 -DNAKAMA_SHARED_LIBRARY_EXPORTS \
            -o ndll/Mac/libnakama_bridge.dylib \
            bridge/nakama_bridge.cpp \
            -Iinclude \
            -F"$(pwd)/ndll/Mac" \
            -framework nakama-sdk
          
          # 验证编译结果
          if [ -f "ndll/Mac/libnakama_bridge.dylib" ]; then
            echo "✅ macOS bridge library built successfully"
            ls -la ndll/Mac/libnakama_bridge.dylib
          else
            echo "❌ Failed to build macOS bridge library"
            exit 1
          fi

      - name: Build bridge library (iOS)
        if: matrix.target == 'iOS'
        run: |
          mkdir -p ndll/iOS/nakama_bridge.framework/Headers
          clang++ -arch arm64 -isysroot $(xcrun --sdk iphoneos --show-sdk-path) -shared -std=c++17 \
            -DNAKAMA_SHARED_LIBRARY_EXPORTS \
            -o ndll/iOS/nakama_bridge.framework/nakama_bridge \
            bridge/nakama_bridge.cpp \
            -Iinclude \
            -Fndll/iOS \
            -framework nakama-sdk
          cp include/nakama_bridge.h ndll/iOS/nakama_bridge.framework/Headers/

      - name: Build bridge library (Android)
        if: matrix.target == 'Android'
        run: |
          mkdir -p ndll/Android/${{ matrix.abi }}
          if [[ "${{ matrix.ndk_arch }}" == "armv7a" ]]; then
            TOOLCHAIN=armv7a-linux-androideabi21-clang++
          elif [[ "${{ matrix.ndk_arch }}" == "aarch64" ]]; then
            TOOLCHAIN=aarch64-linux-android21-clang++
          elif [[ "${{ matrix.ndk_arch }}" == "i686" ]]; then
            TOOLCHAIN=i686-linux-android21-clang++
          elif [[ "${{ matrix.ndk_arch }}" == "x86_64" ]]; then
            TOOLCHAIN=x86_64-linux-android21-clang++
          fi
          $TOOLCHAIN -shared -fPIC -std=c++17 -DNAKAMA_SHARED_LIBRARY_EXPORTS \
            -o ndll/Android/${{ matrix.abi }}/libnakama_bridge.so \
            bridge/nakama_bridge.cpp \
            -Iinclude \
            -Lndll/Android/${{ matrix.abi }} \
            -lnakama-sdk

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bridge-${{ matrix.target }}-${{ matrix.arch }}
          path: ndll/${{ matrix.target }}/

  package:
    needs: build-bridge
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all bridge artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Copy bridge libraries into ndll
        run: |
          # 创建 ndll 目录
          mkdir -p ndll
          
          # Windows
          if [ -d "artifacts/bridge-Windows-x64/ndll/Windows" ]; then
            mkdir -p ndll/Windows
            cp -r artifacts/bridge-Windows-x64/ndll/Windows/* ndll/Windows/
            echo "✅ Windows libraries copied"
          fi
          
          # Linux
          if [ -d "artifacts/bridge-Linux-x64/ndll/Linux" ]; then
            mkdir -p ndll/Linux
            cp -r artifacts/bridge-Linux-x64/ndll/Linux/* ndll/Linux/
            echo "✅ Linux libraries copied"
          fi
          
          # macOS
          if [ -d "artifacts/bridge-Mac-universal/ndll/Mac" ]; then
            mkdir -p ndll/Mac
            cp -r artifacts/bridge-Mac-universal/ndll/Mac/* ndll/Mac/
            echo "✅ macOS libraries copied"
          fi
          
          # iOS
          if [ -d "artifacts/bridge-iOS-arm64/ndll/iOS" ]; then
            mkdir -p ndll/iOS
            cp -r artifacts/bridge-iOS-arm64/ndll/iOS/* ndll/iOS/
            echo "✅ iOS libraries copied"
          fi
          
          # Android (合并各个 ABI)
          for abi in armeabi-v7a arm64-v8a x86 x86_64; do
            if [ -d "artifacts/bridge-Android-$abi/ndll/Android/$abi" ]; then
              mkdir -p ndll/Android/$abi
              cp -r artifacts/bridge-Android-$abi/ndll/Android/$abi/* ndll/Android/$abi/
              echo "✅ Android $abi libraries copied"
            fi
          done
          
          # 显示最终的 ndll 结构
          echo ""
          echo "=== Final ndll structure ==="
          find ndll -type f | head -30

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.4

      - name: Generate haxelib.json
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          if [ -f "haxelib.json.template" ]; then
            sed "s/__VERSION__/$VERSION/g" haxelib.json.template > haxelib.json
          else
            cat > haxelib.json << EOF
          {
              "name": "nakama-sdk",
              "version": "$VERSION",
              "releasenote": "Haxe bindings for Nakama C++ SDK",
              "description": "Nakama game server client for Haxe",
              "url": "https://github.com/yourname/nakama-haxe",
              "license": "Apache-2.0",
              "tags": ["nakama", "game", "backend"],
              "classPath": "src",
              "contributors": ["yourname"],
              "dependencies": {
                  "hxcpp": ""
              }
          }
          EOF
          fi
          echo "Generated haxelib.json:"
          cat haxelib.json

      - name: Generate include.xml
        run: |
          if [ -f "include.xml.template" ]; then
            VERSION=${GITHUB_REF_NAME#v}
            sed "s/__VERSION__/$VERSION/g" include.xml.template > include.xml
          else
            cat > include.xml << 'EOF'
          <include>
              <target id="windows">
                  <lib name="nakama_bridge" dynamic="true" />
              </target>
              <target id="linux">
                  <lib name="nakama_bridge" dynamic="true" />
              </target>
              <target id="mac">
                  <lib name="nakama_bridge" dynamic="true" />
              </target>
              <target id="ios">
                  <lib name="nakama_bridge.framework" framework="true" />
              </target>
              <target id="android">
                  <lib name="nakama_bridge" />
              </target>
          </include>
          EOF
          fi
          echo "Generated include.xml:"
          cat include.xml

      - name: Pack haxelib
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          haxelib pack .
          echo "Created nakama-sdk-${VERSION}.zip"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: haxelib-package
          path: nakama-sdk-*.zip

      - name: Publish to Haxelib
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          HAXELIB_PASSWORD: ${{ secrets.HAXELIB_PASSWORD }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          haxelib submit nakama-sdk-${VERSION}.zip --password $HAXELIB_PASSWORD